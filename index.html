<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat tbd 0.1 (Turbo Streaming + MB Tracker)</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #09090b; /* ธีมสีดำลึก */
            color: #f4f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 100%;
            max-width: 550px;
            height: 85vh;
            background-color: #18181b; /* เทาเข้ม */
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #27272a;
        }
        .chat-header {
            background-color: #27272a;
            padding: 20px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff; 
            border-bottom: 1px solid #3f3f46;
            letter-spacing: 1px;
        }
        #status-container {
            background-color: #18181b;
            padding: 10px 20px;
            font-size: 0.85rem;
            color: #a1a1aa;
            border-bottom: 1px solid #27272a;
        }
        .progress-bar {
            width: 100%;
            background-color: #27272a;
            height: 6px;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }
        #progress-fill {
            width: 0%;
            height: 100%;
            background-color: #ffffff; 
            transition: width 0.1s;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .user-msg {
            background-color: #ffffff; 
            color: #09090b; 
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.05);
        }
        .ai-msg {
            background-color: #27272a; 
            color: #f4f4f5;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #3f3f46;
        }
        .input-container {
            display: flex;
            padding: 15px;
            background-color: #09090b;
            border-top: 1px solid #27272a;
        }
        #user-input {
            flex: 1;
            padding: 14px;
            border: 1px solid #27272a;
            border-radius: 12px;
            background-color: #18181b;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }
        #send-btn {
            background-color: #ffffff; 
            color: #09090b;
            border: none;
            padding: 0 24px;
            margin-left: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:disabled, #user-input:disabled {
            background-color: #27272a;
            color: #71717a;
            cursor: not-allowed;
        }

        /* アニメーション : จุดไข่ปลากำลังคิดสไตล์มินิมอล */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            height: 20px;
            padding: 2px 0;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background-color: #a1a1aa;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">🤖 chat tbd 0.1 (Turbo v3)</div>
        
        <div id="status-container">
            <span id="status-text">กำลังตรวจสอบระบบจัดเก็บหน่วยความจำ...</span>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div class="chat-box" id="chat-box">
            <div class="message ai-msg">ระบบสแตนด์บายในโหมดประหยัดแรม (WASM) เพื่อ iPad... พิมพ์คำถามได้เลยครับ 💬</div>
        </div>
        
        <div class="input-container">
            <input type="text" id="user-input" placeholder="กรุณารรอโหลดสมองกลสักครู่..." disabled onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()" disabled>ส่ง</button>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');

        let chatHistory = []; 
        let currentAiMsgDiv = null;
        let lastPrompt = "";
        let isFirstChunk = true; 

        // เรียกใช้งาน Web Worker
        const aiWorker = new Worker('worker.js', { type: 'module' });
        aiWorker.postMessage({ type: 'load' });

        aiWorker.onmessage = function(event) {
            const { action, status, data } = event.data;

            // ตรวจเช็คความคืบหน้าการดาวน์โหลดโมเดล แสดงหน่วยเป็น MB
            if (action === 'progress') {
                if (status === 'progress') {
                    progressFill.style.width = `${data.progress}%`;
                    
                    const loadedMB = (data.loaded / 1024 / 1024).toFixed(1);
                    const totalMB = (data.total / 1024 / 1024).toFixed(1);
                    const fileName = data.file ? data.file.split('/').pop() : 'ไฟล์โมเดล';
                    
                    statusText.innerText = `📦 โหลด: ${fileName} (${loadedMB} / ${totalMB} MB) [${Math.round(data.progress)}%]`;
                } else if (status === 'ready') {
                    statusText.innerText = "โหลดไฟล์สำเร็จแล้ว... กำลังตั้งค่าก้อนข้อมูลถัดไป";
                }
            } 
            
            else if (action === 'ready') {
                statusText.innerText = "🟢 chat tbd 0.1 พร้อมใช้งาน";
                progressFill.style.width = "100%";
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "พิมพ์ถามมาได้เลย...";
            } 

            // ตัวหนังสือเริ่มไหลออกจากคลังสมอง
            else if (action === 'stream_start') {
                isFirstChunk = true;
            }

            // แสดงผลอักษรไหลทีละพยางค์แบบเรียลไทม์
            else if (action === 'stream') {
                if (isFirstChunk) {
                    currentAiMsgDiv.innerHTML = ""; // ลบอนิเมชันจุดไข่ปลาออกทันทีเมื่อตัวหนังสือแรกมาถึง
                    isFirstChunk = false;
                }
                currentAiMsgDiv.innerText += data; 
                chatBox.scrollTop = chatBox.scrollHeight; 
            }
            
            // ประมวลผลคำตอบเสร็จสิ้น
            else if (action === 'result') {
                let aiReply = currentAiMsgDiv.innerText;
                chatHistory.push({ role: 'assistant', content: aiReply });

                userInput.disabled = false;
                sendBtn.disabled = false;
                statusText.innerText = "🟢 chat tbd 0.1 พร้อมใช้งาน";
                userInput.focus();
            } 
            
            else if (action === 'error') {
                statusText.innerText = "❌ เกิดข้อผิดพลาด: " + data;
                if(currentAiMsgDiv && isFirstChunk) currentAiMsgDiv.innerText = "เกิดข้อผิดพลาดในการดึงข้อมูล";
                userInput.disabled = false;
                sendBtn.disabled = false;
            }
        };

        function appendMessage(content, sender, isHTML = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-msg' : 'ai-msg');
            if (isHTML) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.innerText = content;
            }
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        // ค้นหาช่วงนี้ใน index.html แล้วแก้ตามนี้เลยครับ
window.sendMessage = function() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    userInput.value = '';
    
    userInput.disabled = true;
    sendBtn.disabled = true;
    statusText.innerText = "🧠 chat tbd 0.1 กำลังคิด...";

    const typingAnimationHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    currentAiMsgDiv = appendMessage(typingAnimationHTML, 'ai', true);
    
    // 💡 ปรับตรงนี้: ไม่เอาประวัติการคุยเก่ามารวม ให้ส่งแค่ระบบกับคำถามล่าสุดพอ แรมจะได้ไม่บวม
    lastPrompt = `<|im_start|>system\nYou are a helpful AI assistant name chat tbd 0.1. Answer very shortly and concisely in Thai.<|im_end|>\n`;
    lastPrompt += `<|im_start|>user\n${text}<|im_end|>\n`; 
    lastPrompt += `<|im_start|>assistant\n`;

    aiWorker.postMessage({
        type: 'generate',
        prompt: lastPrompt
    });
};


        window.handleKeyPress = function(event) {
            if (event.key === 'Enter' && !userInput.disabled) {
                window.sendMessage();
            }
        };
    </script>
</body>
</html>
