<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat tbd 0.2 (iPad Optimized)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #121214; color: #e1e1e6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .chat-container { width: 100%; max-width: 600px; background: #1a1a1e; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: flex; flex-direction: column; height: 90vh; overflow: hidden; border: 1px solid #29292e; }
        .chat-header { padding: 15px; background: #202024; border-bottom: 1px solid #29292e; text-align: center; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 5px; background: #fba94c; color: #121214; }
        .status-badge.ready { background: #04d361; color: #fff; }
        .status-badge.error { background: #f75a68; color: #fff; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 15px; word-break: break-word; }
        .message.user { background: #00875f; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.bot { background: #29292e; color: #e1e1e6; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; background: #202024; display: flex; gap: 10px; border-top: 1px solid #29292e; }
        input { flex: 1; padding: 12px; background: #121214; border: 1px solid #29292e; border-radius: 6px; color: white; font-size: 15px; outline: none; }
        input:focus { border-color: #00875f; }
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        button { padding: 12px 20px; background: #00875f; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #00b37e; }
        button:disabled { background: #29292e; color: #7c7c8a; cursor: not-allowed; }
        .progress-bar-container { width: 100%; background: #121214; height: 6px; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #00b37e; transition: width 0.1s ease; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h3>🤖 chat tbd 0.2</h3>
        <div id="status" class="status-badge">กำลังเตรียมระบบ...</div>
    </div>
    <div class="progress-bar-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="chat-box" id="chat-box">
        <div class="message bot">ระบบสแตนด์บายในโหมดประหยัดแรมสูงสุดเพื่อ iPad แล้วครับ โหลดเสร็จพิมพ์คุยได้เลยครับ 💬</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="รอโหลดสมองกลสักครู่..." disabled>
        <button id="send-btn" disabled>ส่ง</button>
    </div>
</div>

<script>
    // 🌟 ใส่ ?v=3 เพื่อทำลายแคชเก่าบน iPad บังคับให้โหลดโค้ดใหม่ล่าสุดจริง ๆ
    const worker = new Worker('worker.js?v=3', { type: 'module' });

    const statusBadge = document.getElementById('status');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    let currentBotMessageDiv = null;

    // สั่งให้ Worker เริ่มโหลดโมเดลทันทีที่เปิดเว็บ
    worker.postMessage({ type: 'load' });

    worker.onmessage = (event) => {
        const { action, status, data } = event.data;

        if (action === 'progress') {
            progressContainer.style.display = 'block';
            if (status === 'progress' && data.progress) {
                statusBadge.innerText = `กำลังดาวน์โหลด: ${Math.round(data.progress)}%`;
                progressBar.style.width = `${data.progress}%`;
            } else if (status === 'ready') {
                statusBadge.innerText = `กำลังติดตั้งโมเดล...`;
            }
        }

        if (action === 'ready') {
            statusBadge.innerText = "● พร้อมใช้งาน (4-bit Mode)";
            statusBadge.className = "status-badge ready";
            progressContainer.style.display = 'none';
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.placeholder = "พิมพ์ข้อความที่นี่...";
            userInput.focus();
        }

        if (action === 'error') {
            statusBadge.innerText = "❌ เกิดข้อผิดพลาด";
            statusBadge.className = "status-badge error";
            appendMessage('bot', `เกิดข้อผิดพลาด: ${data}`);
            console.error(data);
        }

        // เริ่มต้นการส่งข้อความแบบพิมพ์ทีละตัว (Streaming)
        if (action === 'stream_start') {
            currentBotMessageDiv = appendMessage('bot', '');
        }

        if (action === 'stream') {
            if (currentBotMessageDiv) {
                // ค่อยๆ เพิ่มข้อความเข้าไปในหน้าจอ
                currentBotMessageDiv.innerText += data;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        if (action === 'result') {
            currentBotMessageDiv = null;
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    };

    function appendMessage(sender, text) {
        const msg = document.createElement('div');
        msg.className = `message ${sender}`;
        msg.innerText = text;
        chatBox.appendChild(msg);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msg;
    }

    function handleSend() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = '';
        userInput.disabled = true;
        sendBtn.disabled = true;

        // ส่งข้อความไปให้สมองกลคิดคำตอบ
        worker.postMessage({ type: 'generate', prompt: text });
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });
</script>
</body>
</html>
